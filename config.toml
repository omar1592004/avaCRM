# Place this at .streamlit/config.toml in your repo
# Forces Streamlit itself into dark mode so native widgets match

[theme]
base = "dark"
backgroundColor = "#0d1117"
secondaryBackgroundColor = "#161b22"
textColor = "#e6edf3"
primaryColor = "#2f81f7"
font = "sans serif"

[browser]
gatherUsageStats = false
